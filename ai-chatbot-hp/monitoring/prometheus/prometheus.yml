global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'hp-intelligence-gateway'
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['hp-intelligence-gateway:4000']
        labels:
          service: hp-intelligence-gateway
          layer: gateway
          port: "4000"

  - job_name: 'hp-chatbot-ai'
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['hp-chatbot-ai:4001']
        labels:
          service: hp-chatbot-ai
          layer: chatbot
          port: "4001"

  - job_name: 'hp-widget-service'
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets: ['hp-widget-service:4010']
        labels:
          service: hp-widget-service
          layer: widget
          port: "4010"
